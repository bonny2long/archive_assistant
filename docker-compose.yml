services:
  archive-backend:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./backend/archive_assistant.db:/app/backend/archive_assistant.db
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Chicago
      - ARCHIVE_ASSISTANT_TIMEZONE=America/Chicago

  archive-frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - archive-backend
    environment:
      - TZ=America/Chicago
